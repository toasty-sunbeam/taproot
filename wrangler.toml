name = "taproot"
main = "src/index.ts"
compatibility_date = "2025-04-14"

[[kv_namespaces]]
binding = "TAPROOT_KV"
id = "c96d873c96c1416b8b22cb86e3bf4940"
preview_id = "0df2a7ace7884ca68416230cd0e5abbb"

# Required by @cloudflare/workers-oauth-provider.
# Create with: wrangler kv namespace create OAUTH_KV
#              wrangler kv namespace create OAUTH_KV --preview
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "3226757405da43afa1594737360998df"
preview_id = "b57466b274724adfbd43c6c8216823ac"

# Transcript archive (Phase 2).
# Create with: wrangler d1 create taproot-transcripts
# Apply schema: wrangler d1 execute taproot-transcripts --file=migrations/0001_create_transcripts.sql
# For local dev add to .dev.vars: (no extra vars needed; D1 is auto-wired by wrangler dev)
[[d1_databases]]
binding = "TAPROOT_D1"
database_name = "taproot-transcripts"
database_id = "REPLACE_WITH_DATABASE_ID"

# Secrets are set via the CLI, not this file:
#   wrangler secret put TAPROOT_AUTH_TOKEN
#     — acts as the login password on the OAuth consent screen.
#
# For local dev, create .dev.vars (gitignored) with:
#   TAPROOT_AUTH_TOKEN=any-string-you-choose
